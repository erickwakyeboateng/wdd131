<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Eric Kwakye Boateng">
        <meta name="description" content="References and credits for the Discover Ghana educational project.">
        <title>Discover Ghana – Gallery</title>
        <link rel="stylesheet" href="styles/styles.css">
        <link rel="stylesheet" href="styles/mobile-sytles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Roboto:wght@400;500&display=swap"
            rel="stylesheet">
        <script src="scripts/scripts.js" defer></script>
    </head>

    <body>

        <header>
            <nav class="navbar">
                <div class="navbar-inner">
                    <a href="index.html" class="logo-area">
                        <div class="logo-flag" aria-hidden="true">
                            <span class="flag-red"></span>
                            <span class="flag-gold"></span>
                            <span class="flag-green"></span>
                        </div>
                        <span class="logo-text">Discover <span>Ghana</span></span>
                    </a>
                    <ul class="nav-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="attractions.html">Tourist Sites</a></li>
                        <li><a href="culture.html">Culture</a></li>
                        <li><a href="gallery.html" class="active">Gallery</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                    <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </nav>
            <div class="mobile-menu" id="mobile-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="attractions.html">Tourist Sites</a></li>
                    <li><a href="culture.html">Culture</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
        </header>

        <main>
            <section class="section-container">
                <div class="section-header">
                    <h1 class="section-title">Photo Gallery</h1>
                    <div class="section-divider divider-centered"></div>
                    <p class="section-description">A visual journey through the heart of West Africa.</p>
                </div>

                <div class="image-grid">
                    <figure class="gallery-item">
                        <img src="images/accra-city.webp" alt="Accra Cityscape" loading="lazy">
                        <figcaption>Accra Cityscape</figcaption>
                    </figure>
                    <figure class="gallery-item">
                        <img src="images/hero-ghana.webp" alt="Ghana's Independence Square" loading="lazy">
                        <figcaption>Ghana Indepence Square</figcaption>
                    </figure>
                    <figure class="gallery-item">
                        <img src="images/cape-coast-castle.webp" alt="Cape Coast Castle" loading="lazy">
                        <figcaption>Cape Coast Castle</figcaption>
                    </figure>
                    <figure class="gallery-item">
                        <img src="images/kakum-national-park.webp" alt="Kakum Canopy Walk" loading="lazy">
                        <figcaption>Kakum Canopy Walk</figcaption>
                    </figure>
                    <figure class="gallery-item">
                        <img src="images/traditional-kente-cloth.webp" alt="Kente Cloth in use" loading="lazy">
                        <figcaption>Kente Cloth in use</figcaption>
                    </figure>
                    <figure class="gallery-item">
                        <img src="images/ghanaian-cuisine.webp" alt="Ghanaian Food" loading="lazy">
                        <figcaption>Ghanaian Food</figcaption>
                    </figure>
                    <figure class="gallery-item">
                        <img src="images/ghanaian-festival.webp" alt="Cultural Festival" loading="lazy">
                        <figcaption>Cultural Festival</figcaption>
                    </figure>
                    <figure class="gallery-item">
                        <img src="images/mole-national-park.webp" alt="Elephant at Mole Park" loading="lazy">
                        <figcaption>Elephant at Mole Park</figcaption>
                    </figure>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="footer-inner">
                <div class="logo-area footer-logo">
                    <span class="logo-text">Discover <span>Ghana</span></span>
                </div>
                <p class="footer-copyright">
                    &copy; <span id="current-year"></span> Discover Ghana. All rights reserved. |
                    <a href="references.html" style="color: var(--gold); text-decoration: none;">References</a>
                </p>

                <p class="footer-copyright visitor-count-text">
                    Page Visits: <span id="visit-count-display"></span>
                </p>
            </div>
        </footer>

    </body>

</html>
