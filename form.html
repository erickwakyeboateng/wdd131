<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Eric Kwakye Boateng">
        <meta name="description" content="Submit your review for our product.">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

        <title>Product Review</title>
        <link rel="stylesheet" href="styles/form.css">
        <script defer src="scripts/form.js"></script>
    </head>

    <body>

        <header class="header">
            <h1>Product Review</h1>
        </header>

        <main class="container">
            <form method="get" action="review.html" class="form">

                <div class="form-group">
                    <label for="product">Product Name</label>
                    <select id="product" name="product" required>
                        <option value="" disabled selected>Choose a Product ...</option>
                    </select>
                </div>

                <fieldset class="form-group">
                    <legend>Overall Rating</legend>

                    <div class="rating">
                        <label><input type="radio" name="rating" value="1" required> ★</label>
                        <label><input type="radio" name="rating" value="2"> ★★</label>
                        <label><input type="radio" name="rating" value="3"> ★★★</label>
                        <label><input type="radio" name="rating" value="4"> ★★★★</label>
                        <label><input type="radio" name="rating" value="5"> ★★★★★</label>
                    </div>
                </fieldset>

                <div class="form-group">
                    <label for="date">Date of Installation</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <fieldset class="form-group">
                    <legend>Which features did you find useful in the product? <span>(Check all that apply)</span>
                    </legend>

                    <div>
                        <input type="checkbox" id="durability" name="features[]" value="Durability">
                        <label for="durability">Durability</label>
                    </div>

                    <div>
                        <input type="checkbox" id="ease" name="features[]" value="Ease of Use">
                        <label for="ease">Ease of Use</label>
                    </div>

                    <div>
                        <input type="checkbox" id="performance" name="features[]" value="Performance">
                        <label for="performance">Performance</label>
                    </div>

                    <div>
                        <input type="checkbox" id="design" name="features[]" value="Design">
                        <label for="design">Design</label>
                    </div>
                </fieldset>


                <div class="form-group">
                    <label for="review">Written Review <span>(Optional)</span></label>
                    <textarea id="review" name="review"></textarea>
                </div>

                <div class="form-group">
                    <label for="username">Your Name <span>(Optional)</span></label>
                    <input type="text" id="username" name="username">
                </div>

                <input type="submit" value="Post Review" class="submit-btn">

            </form>
        </main>

        <footer class="footer">
            <p>© <span id="currentyear"></span> 🌍 Eric Kwakye Boateng 🌍 Ghana</p>
            <p id="lastModified"></p>
        </footer>

    </body>

</html>
