<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lazy Loading Images</title>
        <link rel="stylesheet" href="styles/lazyload.css">
        <script src="scripts/lazyload.js" defer></script>
    </head>

    <body>
        <main>
            <h1>Lazy Loading Images</h1>
            <p>Scroll down to see the images load as they come into view.</p>
            <img src="images/aarong_reading_to_king_lamoni.webp" alt="Aarong reading to King Lamoni" loading="lazy"
                width="600" height="400">

            <img src="images/abindadi_before_king_noah.webp" alt="Abindadi before King Noah" loading="lazy" width="600"
                height="400">
            <img src="images/alma_testifies_to_korihor.webp" alt="Alma testifies to Korihor" loading="lazy" width="600"
                height="400">
            <img src="images/ammon_lamoni_meets.webp" alt="Ammon and Lamoni meets" loading="lazy" width="600"
                height="400">
            <img src="images/christ_blesses_nephites.webp" alt="Christ blesses the nephites" loading="lazy" width="600"
                height="400">
            <img src="images/jaredite_barge.webp" alt="Jaredite barge" loading="lazy" width="600" height="400">
        </main>
        <footer>
            <p>Lazy Loading Practice</p>
            <p id="lastModified"></p>
        </footer>


    </body>

</html>
